<style>
/* ── CV VIEWER ── */
.cv-toolbar{
  display:flex;align-items:center;gap:1rem;
  max-width:1200px;margin:0 auto;padding:1.4rem 2.5rem 1rem;
}
.cv-tool-label{
  font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--cyan);
  letter-spacing:0.2em;text-transform:uppercase;display:flex;align-items:center;gap:0.8rem;
}
.cv-tool-label::before{content:'';width:24px;height:1px;background:var(--cyan)}
.cv-title{
  font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--white);
  letter-spacing:0.05em;font-size:1.4rem;margin-right:auto;
}
.cv-icon-btn{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-family:'Share Tech Mono',monospace;font-size:0.66rem;letter-spacing:0.12em;
  text-transform:uppercase;text-decoration:none;
  color:var(--gold);border:1px solid rgba(240,192,64,0.4);
  background:rgba(240,192,64,0.06);padding:0.5rem 0.9rem;
  transition:background var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease), color var(--t-base) var(--ease);
  clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
}
.cv-icon-btn svg{width:15px;height:15px;display:block}
.cv-icon-btn:hover{
  background:rgba(240,192,64,0.14);color:#ffe49a;
  box-shadow:0 0 14px rgba(240,192,64,0.25);
}
.cv-icon-btn.ghost{
  color:var(--cyan);border-color:var(--cyan-dim);background:rgba(0,229,255,0.05);
}
.cv-icon-btn.ghost:hover{
  background:rgba(0,229,255,0.12);color:var(--white);box-shadow:0 0 14px rgba(0,229,255,0.22);
}
/* viewer frame */
.cv-frame-wrap{
  max-width:1200px;margin:0 auto 3rem;padding:0 2.5rem;
}
.cv-frame{
  position:relative;border:1px solid var(--border2);background:var(--panel);
  clip-path: polygon(0 14px, 14px 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  overflow:hidden;
}
.cv-frame iframe{
  width:100%;height:82vh;min-height:520px;border:0;display:block;background:#525659;
}
.cv-fallback{
  font-family:'Share Tech Mono',monospace;font-size:0.66rem;color:var(--text3);
  letter-spacing:0.08em;padding:0.8rem 2.5rem;max-width:1200px;margin:0 auto;
}
.cv-fallback a{color:var(--cyan)}
@media(max-width:720px){
  .cv-toolbar{padding:1.2rem 1.2rem 0.8rem;flex-wrap:wrap;gap:0.7rem}
  .cv-title{font-size:1.15rem;width:100%;order:-1}
  .cv-frame-wrap{padding:0 1rem}
  .cv-frame iframe{height:70vh}
  .cv-fallback{padding:0.8rem 1rem}
}
</style>
</head>
